<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>西行妖洞 Pixel</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6e7b7;
      --gold: #f5c04a;
      --red: #d84a36;
      --jade: #76d7b4;
      --night: #081017;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 12%, rgba(245, 192, 74, .09), transparent 24%),
        radial-gradient(circle at 82% 84%, rgba(118, 215, 180, .08), transparent 28%),
        linear-gradient(135deg, #071017 0%, #111a22 52%, #1a1018 100%);
      color: var(--ink);
      font-family: "Songti SC", "Noto Serif TC", "PMingLiU", Georgia, serif;
    }

    .shell {
      min-height: 100%;
      display: grid;
      place-items: start center;
      padding: 16px;
    }

    .game {
      width: min(1180px, 100%);
      display: grid;
      gap: 10px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 3px 0 #5b241b, 0 0 18px rgba(245, 192, 74, .24);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
      font: 900 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .key {
      min-height: 30px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(246, 231, 183, .24);
      border-radius: 6px;
      background: rgba(8, 16, 23, .74);
      padding: 7px 9px;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .04);
    }

    .stage {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 360px;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(246, 231, 183, .28);
      border-radius: 8px;
      background: #050b10;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .5), inset 0 0 0 1px rgba(255, 255, 255, .05);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(4, 9, 13, .42);
      pointer-events: none;
    }

    .panel {
      width: min(660px, 100%);
      border: 1px solid rgba(246, 231, 183, .28);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(10, 22, 30, .94), rgba(5, 11, 16, .94)),
        rgba(6, 13, 18, .94);
      padding: 22px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, .52), inset 0 0 36px rgba(118, 215, 180, .08);
      pointer-events: auto;
    }

    .panel h2 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: clamp(30px, 4vw, 50px);
      line-height: 1;
      letter-spacing: 0;
    }

    .panel p {
      margin: 0 0 18px;
      color: rgba(246, 231, 183, .86);
      font-size: 15px;
      line-height: 1.7;
    }

    button {
      appearance: none;
      border: 1px solid rgba(246, 231, 183, .34);
      border-radius: 7px;
      background: linear-gradient(180deg, #f5c04a 0%, #c9792d 100%);
      color: #24130c;
      font: 900 15px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      padding: 13px 22px;
      box-shadow: 0 8px 0 #69271d, 0 18px 28px rgba(0, 0, 0, .34);
      cursor: pointer;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #69271d, 0 12px 20px rgba(0, 0, 0, .34);
    }

    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .upgrade-grid button {
      min-height: 86px;
      display: grid;
      gap: 5px;
      align-content: center;
      background: linear-gradient(180deg, rgba(23, 44, 52, .96), rgba(8, 16, 23, .96));
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .04), 0 7px 0 #341a16;
      text-align: left;
      line-height: 1.28;
    }

    .upgrade-grid strong {
      color: var(--gold);
      font-size: 15px;
    }

    .upgrade-grid span {
      color: rgba(246, 231, 183, .8);
      font-size: 12px;
      white-space: normal;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .shell {
        padding: 10px;
      }

      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .stage {
        min-height: 260px;
      }

      .upgrade-grid {
        grid-template-columns: 1fr;
      }
    }

    .touch-pad {
      position: absolute;
      bottom: 14px;
      z-index: 12;
      pointer-events: none;
      display: none;
      grid-template-columns: 54px 54px;
      grid-template-rows: 54px 54px;
      gap: 8px;
    }

    .touch-pad.left {
      left: 14px;
    }

    .touch-pad.right {
      right: 14px;
    }

    .tc-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid rgba(246, 231, 183, .55);
      background: rgba(8, 16, 23, .68);
      color: var(--ink);
      font: 800 20px/1 "Songti SC", "Noto Serif TC", "PMingLiU", serif;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      padding: 0;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .55), inset 0 0 0 1px rgba(255, 255, 255, .05);
      cursor: pointer;
      backdrop-filter: blur(2px);
    }

    .tc-btn:active,
    .tc-btn.is-down {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, .55);
      background: rgba(245, 192, 74, .32);
    }

    .tc-btn.jump {
      grid-column: 1 / span 2;
      width: 100%;
      border-color: rgba(118, 215, 180, .65);
      color: var(--jade);
    }

    .tc-btn.attack {
      grid-column: 1 / span 2;
      width: 100%;
      height: 60px;
      background: rgba(216, 74, 54, .58);
      border-color: rgba(255, 156, 116, .85);
      color: #fff3a7;
      font-size: 24px;
    }

    .tc-btn.staff {
      background: rgba(245, 192, 74, .22);
      border-color: rgba(245, 192, 74, .7);
      color: var(--gold);
    }

    .tc-btn.special {
      background: rgba(118, 215, 180, .28);
      border-color: rgba(118, 215, 180, .7);
      color: var(--jade);
    }

    .tc-btn.dodge {
      border-color: rgba(246, 231, 183, .7);
    }

    @media (hover: none) and (pointer: coarse) {
      .touch-pad.left,
      .touch-pad.right {
        display: grid;
      }

      .topbar .controls {
        display: none;
      }

      canvas {
        cursor: default;
      }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      .shell {
        padding: 4px;
      }

      .topbar {
        display: none;
      }

      .game {
        gap: 0;
      }

      .stage {
        min-height: unset;
        max-height: 100vh;
        border-radius: 0;
        border-width: 0;
      }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      .stage::after {
        content: "請將裝置橫放以獲得最佳體驗";
        position: absolute;
        inset: auto 0 0 0;
        padding: 8px;
        text-align: center;
        background: rgba(8, 16, 23, .8);
        color: var(--gold);
        font: 700 13px/1.4 "Songti SC", serif;
        z-index: 11;
        pointer-events: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="game" aria-label="西行妖洞 Pixel 網頁小遊戲">
      <div class="topbar">
        <h1 id="gameTitle">西行妖洞</h1>
        <div class="controls" aria-label="操作方式">
          <span class="key">A/D 或 ←/→ 移動</span>
          <span class="key">W/↑/空白 跳</span>
          <span class="key">滑鼠 普攻</span>
          <span class="key">R 金箍棒 MP</span>
          <span class="key">F 閃避 MP</span>
          <span class="key">V 絕招 SP</span>
        </div>
      </div>
      <div class="stage">
        <canvas id="game" width="640" height="360"></canvas>
        <div id="overlay" class="overlay">
          <div class="panel">
            <h2 id="overlayTitle">五洞開戰</h2>
            <p id="overlayText">五個妖洞，每關五波怪，清完召出 BOSS。R/F 消耗 MP，V 消耗滿格 SP，過關後選一項技能升級。</p>
            <button id="startButton" type="button">START</button>
            <div id="upgradeOptions" class="upgrade-grid hidden" aria-label="技能升級選項"></div>
          </div>
        </div>
        <div class="touch-pad left" aria-hidden="true">
          <button class="tc-btn jump" data-key=" " aria-label="跳">↑</button>
          <button class="tc-btn dpad" data-key="ArrowLeft" aria-label="左">←</button>
          <button class="tc-btn dpad" data-key="ArrowRight" aria-label="右">→</button>
        </div>
        <div class="touch-pad right" aria-hidden="true">
          <button class="tc-btn staff" data-key="r" aria-label="金箍棒">棒</button>
          <button class="tc-btn special" data-key="v" aria-label="絕招">絕</button>
          <button class="tc-btn dodge" data-key="f" aria-label="閃避">閃</button>
          <button class="tc-btn attack" data-attack aria-label="攻擊">攻</button>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
  <script>
    (() => {
      const dispatchKey = (type, key) => {
        window.dispatchEvent(new KeyboardEvent(type, { key, bubbles: true }));
      };

      document.querySelectorAll(".tc-btn").forEach((btn) => {
        const isAttack = btn.dataset.attack !== undefined;
        const key = btn.dataset.key;
        let active = false;

        const press = (event) => {
          if (event) event.preventDefault();
          if (active) return;
          active = true;
          btn.classList.add("is-down");
          if (isAttack) {
            if (typeof window.heroBasicAttack === "function") {
              window.heroBasicAttack();
            }
          } else if (key) {
            dispatchKey("keydown", key);
          }
        };

        const release = (event) => {
          if (event) event.preventDefault();
          if (!active) return;
          active = false;
          btn.classList.remove("is-down");
          if (!isAttack && key) dispatchKey("keyup", key);
        };

        btn.addEventListener("touchstart", press, { passive: false });
        btn.addEventListener("touchend", release);
        btn.addEventListener("touchcancel", release);
        btn.addEventListener("pointerdown", (event) => {
          if (event.pointerType === "touch") return;
          press(event);
        });
        btn.addEventListener("pointerup", (event) => {
          if (event.pointerType === "touch") return;
          release(event);
        });
        btn.addEventListener("pointerleave", (event) => {
          if (event.pointerType === "touch") return;
          release(event);
        });
        btn.addEventListener("contextmenu", (event) => event.preventDefault());
      });
    })();
  </script>
</body>
</html>
