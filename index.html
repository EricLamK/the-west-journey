<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>西行妖洞 Pixel</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6e7b7;
      --gold: #f5c04a;
      --red: #d84a36;
      --jade: #76d7b4;
      --night: #081017;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 12%, rgba(245, 192, 74, .09), transparent 24%),
        radial-gradient(circle at 82% 84%, rgba(118, 215, 180, .08), transparent 28%),
        linear-gradient(135deg, #071017 0%, #111a22 52%, #1a1018 100%);
      color: var(--ink);
      font-family: "Songti SC", "Noto Serif TC", "PMingLiU", Georgia, serif;
    }

    .shell {
      min-height: 100%;
      display: grid;
      place-items: start center;
      padding: 16px;
    }

    .game {
      width: min(1180px, 100%);
      display: grid;
      gap: 10px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 3px 0 #5b241b, 0 0 18px rgba(245, 192, 74, .24);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
      font: 900 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .key {
      min-height: 30px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(246, 231, 183, .24);
      border-radius: 6px;
      background: rgba(8, 16, 23, .74);
      padding: 7px 9px;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .04);
    }

    .stage {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 360px;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(246, 231, 183, .28);
      border-radius: 8px;
      background: #050b10;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .5), inset 0 0 0 1px rgba(255, 255, 255, .05);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(4, 9, 13, .42);
      pointer-events: none;
    }

    .panel {
      width: min(660px, 100%);
      border: 1px solid rgba(246, 231, 183, .28);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(10, 22, 30, .94), rgba(5, 11, 16, .94)),
        rgba(6, 13, 18, .94);
      padding: 22px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, .52), inset 0 0 36px rgba(118, 215, 180, .08);
      pointer-events: auto;
    }

    .panel h2 {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: clamp(30px, 4vw, 50px);
      line-height: 1;
      letter-spacing: 0;
    }

    .panel p {
      margin: 0 0 18px;
      color: rgba(246, 231, 183, .86);
      font-size: 15px;
      line-height: 1.7;
    }

    button {
      appearance: none;
      border: 1px solid rgba(246, 231, 183, .34);
      border-radius: 7px;
      background: linear-gradient(180deg, #f5c04a 0%, #c9792d 100%);
      color: #24130c;
      font: 900 15px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      padding: 13px 22px;
      box-shadow: 0 8px 0 #69271d, 0 18px 28px rgba(0, 0, 0, .34);
      cursor: pointer;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #69271d, 0 12px 20px rgba(0, 0, 0, .34);
    }

    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .upgrade-grid button {
      min-height: 86px;
      display: grid;
      gap: 5px;
      align-content: center;
      background: linear-gradient(180deg, rgba(23, 44, 52, .96), rgba(8, 16, 23, .96));
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .04), 0 7px 0 #341a16;
      text-align: left;
      line-height: 1.28;
    }

    .upgrade-grid strong {
      color: var(--gold);
      font-size: 15px;
    }

    .upgrade-grid span {
      color: rgba(246, 231, 183, .8);
      font-size: 12px;
      white-space: normal;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .shell {
        padding: 10px;
      }

      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .stage {
        min-height: 260px;
      }

      .upgrade-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="game" aria-label="西行妖洞 Pixel 網頁小遊戲">
      <div class="topbar">
        <h1 id="gameTitle">西行妖洞</h1>
        <div class="controls" aria-label="操作方式">
          <span class="key">A/D 或 ←/→ 移動</span>
          <span class="key">W/↑/空白 跳</span>
          <span class="key">滑鼠 普攻</span>
          <span class="key">R 金箍棒 MP</span>
          <span class="key">F 閃避 MP</span>
          <span class="key">V 絕招 SP</span>
        </div>
      </div>
      <div class="stage">
        <canvas id="game" width="640" height="360"></canvas>
        <div id="overlay" class="overlay">
          <div class="panel">
            <h2 id="overlayTitle">五洞開戰</h2>
            <p id="overlayText">五個妖洞，每關五波怪，清完召出 BOSS。R/F 消耗 MP，V 消耗滿格 SP，過關後選一項技能升級。</p>
            <button id="startButton" type="button">START</button>
            <div id="upgradeOptions" class="upgrade-grid hidden" aria-label="技能升級選項"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
